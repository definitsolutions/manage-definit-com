services:
  caddy:
    image: caddy:2
    container_name: manage_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./shell:/etc/caddy/shell:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - manage_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: manage_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=M4n4g3P0stgr3s!2026
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - manage_network
    restart: unless-stopped

  recurring-tasks:
    build: ./RecurringTasks
    container_name: manage_recurring_tasks
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://recurring_tasks:Rt4sks_M4n4g3_2026@postgres:5432/recurring_tasks
      - PORT=3008
      - PORTAL_SHARED_SECRET=a1b2e4828ec0bc8c11ce1a9d77f9e779aae1c6e523b58c3912a050d6dcf895bf
      - GENERATION_SCHEDULE=0 1 * * *
    networks:
      - manage_network
    depends_on:
      - postgres
    restart: unless-stopped

  notes:
    build: ./Notes
    container_name: manage_notes
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://notes:N0t3s_M4n4g3_2026@postgres:5432/notes
      - PORT=3009
    networks:
      - manage_network
    depends_on:
      - postgres
    restart: unless-stopped

  callscribe:
    build: ./CallScribe
    container_name: manage_callscribe
    env_file:
      - ./callscribe-api/.env
    volumes:
      - callscribe_storage:/app/storage
    networks:
      - manage_network
    depends_on:
      - postgres
    restart: unless-stopped

  email-review:
    build: ./EmailReview
    container_name: manage_email_review
    env_file:
      - ./EmailReview/.env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    networks:
      - manage_network
    depends_on:
      - postgres
    restart: unless-stopped

  teams-tracker:
    build: ./TeamsTracker
    container_name: manage_teams_tracker
    env_file:
      - ./TeamsTracker/.env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    networks:
      - manage_network
    depends_on:
      - postgres
    restart: unless-stopped

  checkmate-mongo:
    image: ghcr.io/bluewave-labs/checkmate-mongo:latest
    container_name: manage_checkmate_mongo
    restart: unless-stopped
    volumes:
      - checkmate_mongo_data:/data/db
    command: ["mongod", "--quiet", "--bind_ip_all"]
    networks:
      - manage_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

  checkmate-server:
    image: ghcr.io/bluewave-labs/checkmate-backend:latest
    container_name: manage_checkmate_server
    restart: unless-stopped
    expose:
      - "52345"
    environment:
      - DB_CONNECTION_STRING=mongodb://checkmate-mongo:27017/uptime_db
      - CLIENT_HOST=https://status.definit.com
      - ORIGIN=https://status.definit.com
      - JWT_SECRET=xK9m2pQ7vR4sN8wL3jF6hT1yB5gD0cA
      - TOKEN_TTL=365d
    networks:
      - manage_network
    depends_on:
      checkmate-mongo:
        condition: service_healthy

  checkmate-client:
    image: ghcr.io/bluewave-labs/checkmate-client:latest
    container_name: manage_checkmate_client
    restart: unless-stopped
    expose:
      - "80"
    environment:
      UPTIME_APP_API_BASE_URL: "/api/v1"
      UPTIME_APP_CLIENT_HOST: "https://status.definit.com"
    volumes:
      - ./Checkmate/nginx-default.conf:/etc/nginx/conf.d/default.conf
      - ./Checkmate/checkmate-branding.css:/custom/checkmate-branding.css
      - ./Checkmate/checkmate-auto-login.js:/custom/checkmate-auto-login.js
    networks:
      - manage_network
    depends_on:
      checkmate-server:
        condition: service_started

networks:
  manage_network:
    driver: bridge

volumes:
  caddy_data:
  checkmate_mongo_data:
  caddy_config:
  postgres_data:
  callscribe_storage:
