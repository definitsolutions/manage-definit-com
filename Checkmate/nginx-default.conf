server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    server_tokens off;

    # Custom branding/script files
    location = /checkmate-branding.css {
        alias /custom/checkmate-branding.css;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }
    location = /checkmate-auto-login.js {
        alias /custom/checkmate-auto-login.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Prevent caching of the SPA shell
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Disable Cloudflare Rocket Loader
        sub_filter 'type="module"' 'type="module" data-cfasync="false"';

        # Inject branding CSS + auto-login
        sub_filter '</head>' '<link rel="stylesheet" href="/checkmate-branding.css?v=2" data-cfasync="false"><script src="/checkmate-auto-login.js" data-cfasync="false"></script></head>';

        sub_filter_once on;
        sub_filter_types text/html;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://manage_checkmate_server:52345/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
